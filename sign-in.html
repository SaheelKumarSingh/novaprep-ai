<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - NovaPrep</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="global.css" rel="stylesheet">
    <style>
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
            width: 100%;
        }

        /* Fix applied here: box-sizing border-box and width 100% forces inputs to stay inside the flex container */
        .input-box {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <canvas id="cursor-canvas"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0;"></canvas>

    <!-- Ambient Geometric Background -->
    <div class="bg-geometry">
        <div class="iso-container">
            <div class="iso-grid"></div>
            <div class="iso-panel panel-1"></div>
            <div class="iso-panel panel-2"></div>
            <div class="iso-panel panel-3"></div>
            <div class="glow-node n1"></div>
            <div class="glow-node n2"></div>
            <div class="glow-node n3"></div>
        </div>
    </div>

    <div class="auth-wrapper">
        <a href="index.html" class="logo" style="position: absolute; top: 2rem; left: 4rem;">Nova<span>Prep</span></a>

        <div class="auth-box card-bracket">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: -0.03em;">Welcome Back</h2>
            <p style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); margin-bottom: 2rem;">//
                AUTHENTICATE TO ACCESS PREP VAULT</p>

            <form class="auth-form" onsubmit="event.preventDefault(); alert('Authentication simulated.');">
                <input type="email" class="input-box" placeholder="Email Address" required>
                <input type="password" class="input-box" placeholder="Password" required>

                <button type="submit" class="btn-solid" style="margin-top: 1rem; padding: 1rem; width: 100%;">Log
                    In</button>
            </form>
        </div>
    </div>
    <script src="cursor.js"></script>
</body>

</html>
